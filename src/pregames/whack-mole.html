<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>打地鼠</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;font-family:system-ui,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;overflow:hidden;user-select:none}
h1{color:#f59e0b;font-size:22px;margin-bottom:8px}
.score{color:#e2e8f0;font-size:16px;margin-bottom:12px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.hole{width:80px;height:80px;background:#2d2d44;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:36px;cursor:pointer;transition:transform .1s;position:relative;overflow:hidden}
.hole:active{transform:scale(.9)}
.mole{animation:pop .6s ease-out}
@keyframes pop{0%{transform:scale(0)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
</style>
</head>
<body>
<h1>打地鼠</h1>
<div class="score">得分: <span id="s">0</span> | 时间: <span id="t">30</span>s</div>
<div class="grid" id="g"></div>
<script>
const grid=document.getElementById('g'),scoreEl=document.getElementById('s'),timeEl=document.getElementById('t');
let score=0,time=30,active=-1,timer;
for(let i=0;i<9;i++){const d=document.createElement('div');d.className='hole';d.onclick=()=>hit(i);grid.appendChild(d)}
const holes=grid.children;
function randomMole(){if(active>=0)holes[active].innerHTML='';active=Math.floor(Math.random()*9);holes[active].innerHTML='<span class="mole">🐹</span>'}
function hit(i){if(i===active){score+=10;scoreEl.textContent=score;holes[i].innerHTML='<span style="font-size:28px">💥</span>';active=-1;setTimeout(randomMole,300)}}
timer=setInterval(()=>{time--;timeEl.textContent=time;if(time<=0){clearInterval(timer);alert('游戏结束！得分:'+score);location.reload();return}randomMole()},1000);
randomMole();
</script>
</body>
</html>
