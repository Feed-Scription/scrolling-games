<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>贪吃蛇</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:system-ui,sans-serif;user-select:none;overflow:hidden}
h1{color:#10b981;font-size:20px;margin-bottom:6px}
.info{color:#94a3b8;font-size:14px;margin-bottom:8px}
canvas{border:2px solid #334155;border-radius:8px;touch-action:none}
.ctrl{display:grid;grid-template-columns:repeat(3,56px);grid-template-rows:repeat(2,48px);gap:4px;margin-top:10px}
.ctrl button{background:#334155;color:#e2e8f0;border:none;border-radius:8px;font-size:20px;cursor:pointer}
.ctrl button:active{background:#475569}
</style>
</head>
<body>
<h1>贪吃蛇</h1>
<div class="info">得分: <span id="s">0</span></div>
<canvas id="cv" width="300" height="300"></canvas>
<div class="ctrl">
<div></div><button onclick="setDir(0,-1)">⬆</button><div></div>
<button onclick="setDir(-1,0)">⬅</button><button onclick="setDir(0,1)">⬇</button><button onclick="setDir(1,0)">➡</button>
</div>
<script>
var cv=document.getElementById("cv"),ctx=cv.getContext("2d"),sEl=document.getElementById("s");
var SZ=15,W=cv.width/SZ,H=cv.height/SZ;
var snake=[{x:10,y:10}],dir={x:0,y:-1},nextDir={x:0,y:-1},food,score=0,alive=true;
function placeFood(){do{food={x:Math.floor(Math.random()*W),y:Math.floor(Math.random()*H)}}while(snake.some(function(s){return s.x===food.x&&s.y===food.y}))}
function setDir(x,y){if(dir.x+x!==0||dir.y+y!==0)nextDir={x:x,y:y}}
function draw(){
  ctx.fillStyle="#1e293b";ctx.fillRect(0,0,cv.width,cv.height);
  ctx.fillStyle="#ef4444";ctx.beginPath();ctx.arc(food.x*SZ+SZ/2,food.y*SZ+SZ/2,SZ/2-1,0,Math.PI*2);ctx.fill();
  snake.forEach(function(s,i){ctx.fillStyle=i?"#22c55e":"#4ade80";ctx.fillRect(s.x*SZ+1,s.y*SZ+1,SZ-2,SZ-2)});
}
function update(){
  if(!alive)return;
  dir=nextDir;
  var head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
  if(head.x<0||head.x>=W||head.y<0||head.y>=H||snake.some(function(s){return s.x===head.x&&s.y===head.y})){alive=false;setTimeout(function(){alert("游戏结束！得分: "+score);location.reload()},100);return}
  snake.unshift(head);
  if(head.x===food.x&&head.y===food.y){score+=10;sEl.textContent=score;placeFood()}else snake.pop();
  draw();
}
placeFood();draw();setInterval(update,150);
</script>
</body>
</html>
