<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>反应测试</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:system-ui,sans-serif;user-select:none;overflow:hidden;color:#e2e8f0}
h1{color:#a78bfa;font-size:22px;margin-bottom:12px}
.info{font-size:15px;color:#94a3b8;margin-bottom:16px}
#btn{width:140px;height:140px;border-radius:50%;border:none;font-size:40px;cursor:pointer;transition:all .15s}
#btn:active{transform:scale(.9)}
.wait{background:#475569;animation:none}
.go{background:#22c55e;animation:pulse .5s infinite}
.done{background:#6366f1}
.result{margin-top:20px;font-size:20px;color:#10b981}
.best{margin-top:8px;font-size:14px;color:#64748b}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.4)}50%{box-shadow:0 0 0 12px rgba(34,197,94,0)}}
</style>
</head>
<body>
<h1>反应速度测试</h1>
<div class="info" id="info">点击按钮开始</div>
<button id="btn" class="done" onclick="handle()">🎯</button>
<div class="result" id="res"></div>
<div class="best" id="best"></div>
<script>
var btn=document.getElementById("btn"),info=document.getElementById("info"),res=document.getElementById("res"),bestEl=document.getElementById("best");
var state="idle",t0,timeout,best=Infinity;
function handle(){
  if(state==="idle"){start()}
  else if(state==="wait"){clearTimeout(timeout);state="idle";btn.className="done";info.textContent="太早了！点击重试";res.textContent="❌"}
  else if(state==="go"){finish()}
}
function start(){
  state="wait";btn.className="wait";btn.innerHTML="⏳";info.textContent="等待变绿...";res.textContent="";
  var delay=1000+Math.random()*3000;
  timeout=setTimeout(function(){state="go";btn.className="go";btn.innerHTML="👆";info.textContent="现在点击！";t0=Date.now()},delay);
}
function finish(){
  var ms=Date.now()-t0;state="idle";btn.className="done";btn.innerHTML="🎯";
  if(ms<best)best=ms;
  info.textContent="点击重新测试";
  res.textContent=ms+"ms";
  bestEl.textContent="最佳: "+best+"ms";
}
</script>
</body>
</html>
